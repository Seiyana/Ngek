<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Chat Layout with Theme Toggle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-header">
        <div class="bot-identity">
            <div class="bot-avatar" style="width: 32px; height: 32px;">
                <img src="assets/image.png" alt="Bot Picture">
            </div>
            <span>My Assistant</span>
        </div>
        <button class="theme-toggle-btn" id="theme-toggle">Dark Mode</button>
    </header>

    <div class="chat-container" id="chat-container">
        <div class="messages-wrapper" id="messages-wrapper">
            
            <div class="message-row bot">
                <div class="bot-avatar">
                    <img src="assets/image.png" alt="Bot Picture">
                </div>
                <div class="bot-content">
                    <p>Hello! I'm connected to Qwen 2.5 on your local machine.</p>
                </div>
            </div>

        </div>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <textarea id="user-input" placeholder="Enter a prompt here" rows="1"></textarea>
            <button class="send-btn" id="send-btn" aria-label="Send message">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
