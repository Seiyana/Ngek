<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JILIAN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-header">
        <div class="bot-identity">
            <div class="bot-avatar">
                <img src="assets/image.png" alt="Bot Picture">
            </div>
            <span>JILIAN - Your Interactive Automated Navigation</span>
        </div>
        <button class="theme-toggle-btn" id="theme-toggle">Dark Mode</button>
    </header>

    <div class="chat-container" id="chat-container">
        <div class="messages-wrapper" id="messages-wrapper">
            
            <div class="message-row bot">
                <div class="bot-avatar">
                    <img src="assets/image.png" alt="Bot Picture">
                </div>
                <div class="bot-content">
                    <p>Hello! I'm JILIAN. How can I assist you today?</p>
                </div>
            </div>

            <div class="suggestions-row">
                <button class="suggestion-bubble">Where is JILCF located?</button>
                <button class="suggestion-bubble">What are the courses offered?</button>
                 <button class="suggestion-bubble">How to go to JILCF?</button>
            </div>

        </div>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <textarea id="user-input" placeholder="Enter a prompt here" rows="1"></textarea>

            <button class="stop-btn" id="stop-btn" aria-label="Stop generation" >
        <svg viewBox="0 0 24 24" width="24" height="24">
            <rect x="6" y="6" width="12" height="12" fill="currentColor"/>
        </svg>
    </button>
            <button class="send-btn" id="send-btn" aria-label="Send message">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
